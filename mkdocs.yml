# Trino Documentation — MkDocs Material
# https://squidfunk.github.io/mkdocs-material/

site_name: Trino Documentation
site_description: Documentation for Trino distributed SQL query engine
site_author: trino-docs
site_url: https://ivanshamaev.github.io/trino-docs/
docs_dir: docs

# Тема Material: боковое меню, поиск, тёмная тема
theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

# Репозиторий для ссылки «Edit» (замените на свой)
repo_url: https://github.com/ivanshamaev/trino-docs/
edit_uri: edit/main/
repo_name: ivanshamaev/trino-docs

plugins:
  - search
  - glightbox

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview: overview.md
  - Installation: installation.md
  - Client: client.md
  - Security: security.md
  - Admin:
    - Administration: admin.md
    - Web UI: admin/web-interface.md
    - Preview Web UI: admin/preview-web-interface.md
    - Logging: admin/logging.md
    - Tuning Trino: admin/tuning.md
    - Monitoring with JMX: admin/jmx.md
    - Observability with OpenTelemetry: admin/opentelemetry.md
    - Trino metrics with OpenMetrics: admin/openmetrics.md
    - Properties reference: admin/properties.md
    - Spill to disk: admin/spill.md
    - Resource groups: admin/resource-groups.md
    - Session property managers: admin/session-property-managers.md
    - Distributed sort: admin/dist-sort.md
    - Dynamic filtering: admin/dynamic-filtering.md
    - Graceful shutdown: admin/graceful-shutdown.md
    - Fault-tolerant execution: admin/fault-tolerant-execution.md
    - Event listeners:
      - HTTP event listener: admin/event-listeners-http.md
      - Kafka event listener: admin/event-listeners-kafka.md
      - MySQL event listener: admin/event-listeners-mysql.md
      - OpenLineage event listener: admin/event-listeners-openlineage.md
    - Properties (detailed):
      - General properties: admin/properties-general.md
      - Client protocol properties: admin/properties-client-protocol.md
      - HTTP server properties: admin/properties-http-server.md
      - Resource management properties: admin/properties-resource-management.md
      - Query management properties: admin/properties-query-management.md
      - Catalog management properties: admin/properties-catalog.md
      - SQL environment properties: admin/properties-sql-environment.md
      - Spilling properties: admin/properties-spilling.md
      - Exchange properties: admin/properties-exchange.md
      - Task properties: admin/properties-task.md
      - Write partitioning properties: admin/properties-write-partitioning.md
      - Writer scaling properties: admin/properties-writer-scaling.md
      - Node scheduler properties: admin/properties-node-scheduler.md
      - Optimizer properties: admin/properties-optimizer.md
      - Logging properties: admin/properties-logging.md
      - Web UI properties: admin/properties-web-interface.md
      - Regular expression function properties: admin/properties-regexp-function.md
      - HTTP client properties: admin/properties-http-client.md
  - Optimizer: optimizer.md
  - Connector: connector.md
  - Object storage: object-storage.md
  - Functions: functions.md
  - User-defined functions: udf.md
  - Language: language.md
  - SQL: sql.md
  - Develop: develop.md
  - Glossary: glossary.md
  - Appendix: appendix.md
  - Release notes: release.md
