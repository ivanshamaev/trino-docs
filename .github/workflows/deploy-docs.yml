name: Deploy Trino Documentation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./docs
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme pygments==2.16.1
          # Install any additional Sphinx extensions required
          pip install sphinx-tabs sphinxcontrib-video

      - name: Build documentation
        working-directory: ./docs/sphinx
        run: |
          sphinx-build -W --keep-going -b html . ../_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './docs/_build/html'

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
